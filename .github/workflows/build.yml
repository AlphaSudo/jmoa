name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Publication safety scan
        shell: pwsh
        run: ./scripts/check-publication-safety.ps1

      - name: Documentation quality
        shell: pwsh
        run: ./scripts/check-documentation-quality.ps1 -SkipPublicationSafety

      - name: Build public modules
        run: mvn -q -pl jmoa-runtime-lib,jmoa-maven-plugin clean test
